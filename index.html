<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ঈদ মোবারক - Eid Mubarak</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0d1b2a;
            --light-blue: #1b263b;
            --gold: #fde047;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(253, 224, 71, 0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: radial-gradient(circle at center, var(--deep-blue) 0%, var(--light-blue) 100%);
            color: var(--white);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .bg-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .orb {
            position: absolute;
            background: radial-gradient(circle, rgba(253,224,71,0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: floatOrb 15s infinite alternate;
        }
        @keyframes floatOrb { 0% { transform: translate(0,0); } 100% { transform: translate(100px,50px); } }

        .card {
            position: relative; z-index:10;
            width: 88%; max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1.5px solid var(--border);
            border-radius: 40px;
            padding: 45px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(253,224,71,0.1);
        }
        .card::before {
            content: "";
            position: absolute;
            top:-50%; left:-50%;
            width:200%; height:200%;
            background: conic-gradient(transparent, transparent, var(--gold), transparent);
            animation: rotateBorder 6s linear infinite;
            z-index:-1; opacity:0.3;
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        .step { display: none; opacity: 0; transform: scale(0.9); }
        .step.active { display:flex; flex-direction:column; align-items:center; animation: zoomIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        @keyframes zoomIn { to { opacity:1; transform:scale(1); } }

        .icon-container { width:100%; min-height:120px; margin-bottom:25px; display:flex; justify-content:center; align-items:center; filter: drop-shadow(0 0 10px rgba(253,224,71,0.5)); }
        .custom-png-icon { width:100%; max-width:280px; object-fit:contain; }
        .floating-icon { animation: floating 3.5s ease-in-out infinite; }
        @keyframes floating { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.02); } }

        .profile-wrapper { position: relative; margin-bottom:25px; width:140px; height:140px; }
        .profile-img { width:100%; height:100%; border-radius:50%; object-fit:cover; border:4px solid var(--gold); padding:4px; background: rgba(0,0,0,0.2); }
        .profile-ring { position:absolute; top:-5px; left:-5px; right:-5px; bottom:-5px; border:2px dashed var(--gold); border-radius:50%; animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        h1 { font-size: 34px; color: var(--gold); text-shadow: 0 0 15px rgba(253,224,71,0.5); margin-bottom:12px; }
        .description { font-size:17px; color:#d1fae5; line-height:1.6; margin-bottom:30px; }

        .primary-btn { background: var(--gold); color: var(--deep-blue); padding:16px 35px; border-radius:20px; font-size:19px; font-weight:700; border:none; cursor:pointer; box-shadow:0 10px 25px rgba(253,224,71,0.3); text-transform:uppercase; letter-spacing:1px; transition:0.3s; }
        .primary-btn:hover { transform: translateY(-5px); box-shadow:0 15px 30px rgba(253,224,71,0.5); }

        .typing-box { font-size:22px; min-height:90px; color: var(--gold); font-weight:500; }
        canvas#confetti { position:fixed; top:0; left:0; width:100%; height:100%; z-index:100; pointer-events:none; }
        .footer { position:fixed; bottom:20px; font-size:11px; letter-spacing:2px; opacity:0.6; text-transform:uppercase; }
    </style>
</head>
<body>
    <!-- Audio Element -->
    <audio id="bg-audio" loop preload="auto">
        <source src="Eid Mubarak _ New Eid Kalam 2022 _ Madani Raza _ Naat Production_320k.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-elements">
        <div class="orb" style="width: 400px; height: 400px; top: -10%; left: -10%;"></div>
        <div class="orb" style="width: 300px; height: 300px; bottom: -5%; right: -5%;"></div>
    </div>

    <div class="card">
        <div class="step active" id="step1">
            <div class="icon-container floating-icon">
                <img src="https://lh3.googleusercontent.com/d/1IQCQ_q5pME8zPvINMWmqVx8Gn_3cJe9Z" alt="Eid Mubarak Logo" class="custom-png-icon">
            </div>
            <p class="description">Chowdhury IT Organisations-এর পক্ষ থেকে...</p>
            <button class="primary-btn" id="start-btn" onclick="handleStart()">দেখুন</button>
        </div>

        <div class="step" id="step2">
            <div class="icon-container floating-icon">
                <img src="https://lh3.googleusercontent.com/d/1Eo5QxLJ6AXALGbd9GR1Dv6lyfiQwep_D" alt="Eid Text Logo" class="custom-png-icon">
            </div>
            <div class="typing-box" id="type-text"></div>
        </div>

        <div class="step" id="step3">
            <div class="profile-wrapper">
                <div class="profile-ring"></div>
                <img src="https://lh3.googleusercontent.com/d/1TDqRC3cc52sjokqVA5JNDRMw-g-My1Hu" alt="Ramjan Ali" class="profile-img">
            </div>
            <h1>ঈদ মোবারক</h1>
            <p class="description" style="color:#fff;">আল্লাহ আপনার এবং আপনার পরিবারের উপর অফুরন্ত রহমত ও খুশি বর্ষণ করুন।</p>
            <div style="background: rgba(255,255,255,0.05); padding:15px; border-radius:15px;">
                <p style="font-size:14px; color: var(--gold); font-weight:600;">শুভেচ্ছান্তে: Chowdhury IT Organisations</p>
            </div>
            <button class="primary-btn" style="margin-top:25px; font-size:14px; padding:10px 20px;" onclick="location.reload()">আবার দেখুন 🔄</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <div class="footer">© 2026 Chowdhury IT Organisations</div>

    <script>
        function handleStart() {
            const audio = document.getElementById('bg-audio');
            if(audio) audio.play().catch(e=>console.log(e));
            goToStep(2);
        }

        const messages = [
            "রমজান শেষে এলো খুশির ঈদ...",
            "রঙিন হোক আপনার প্রতিটি মুহূর্ত।",
            "পবিত্র এই দিনে জানাই অনেক ভালোবাসা।"
        ];

        function goToStep(s) {
            document.querySelectorAll('.step').forEach(el=>el.classList.remove('active'));
            document.getElementById(`step${s}`).classList.add('active');
            if(s===2) startTyping(0);
            if(s===3) startCelebration();
        }

        function startTyping(idx) {
            const box = document.getElementById('type-text');
            let text = messages[idx], i=0; box.innerHTML="";
            const interval = setInterval(()=>{
                box.innerHTML += text[i]; i++;
                if(i===text.length){ clearInterval(interval);
                    setTimeout(()=>{ if(idx<messages.length-1) startTyping(idx+1); else goToStep(3); }, 1600);
                }
            },70);
        }

        function startCelebration() {
            const canvas=document.getElementById("confetti"), ctx=canvas.getContext("2d");
            canvas.width=window.innerWidth; canvas.height=window.innerHeight;
            let particles=[];
            for(let i=0;i<120;i++){
                particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,size:Math.random()*7+3,color:['#fde047','#fbbf24','#ffffff','#10b981'][Math.floor(Math.random()*4)],v:Math.random()*3+2,angle:Math.random()*6});
            }
            function update(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p=>{
                    p.y+=p.v; p.x+=Math.sin(p.angle);
                    if(p.y>canvas.height) p.y=-10;
                    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(update);
            }
            update();
        }

        window.addEventListener('resize', ()=>{
            const canvas=document.getElementById("confetti");
            if(canvas){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
        });

        // Auto play audio fallback
        const audio=document.getElementById('bg-audio');
        window.addEventListener('load', ()=>{ audio.play().catch(()=>console.log("Autoplay blocked")) });
        window.addEventListener('click', ()=>audio.play().catch(()=>{}));
        window.addEventListener('touchstart', ()=>audio.play().catch(()=>{}));
    </script>
</body>
</html>
